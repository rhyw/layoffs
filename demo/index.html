<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layoffs Tracker Demo</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #0f0f0f; color: #e0e0e0; line-height: 1.6; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
        header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        h1 { font-size: 1.5rem; font-weight: 700; }
        h1 svg { color: #7c3aed; vertical-align: middle; margin-right: 0.5rem; }
        .subtitle { color: #6b7280; font-size: 0.875rem; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; margin-left: 0.375rem; background: rgba(124,58,237,0.15); color: #a78bfa; }
        table { width: 100%; border-collapse: collapse; border: 1px solid #2a2a40; border-radius: 0.75rem; overflow: hidden; font-size: 0.875rem; }
        thead { background: #1a1a2e; }
        th { padding: 0.75rem 1rem; text-align: left; font-weight: 600; color: #a0a0b0; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #2a2a40; }
        td { padding: 0.75rem 1rem; border-bottom: 1px solid #2a2a40; }
        tbody tr:hover { background: rgba(124,58,237,0.05); }
        tbody tr:nth-child(even) { background: rgba(124,58,237,0.02); }
        td:first-child { font-weight: 500; }
        .loading, .error, .empty { text-align: center; padding: 3rem 1rem; color: #6b7280; }
        .error { color: #ef4444; }
        .stats { display: flex; gap: 2rem; margin-bottom: 2rem; }
        .stat { text-align: center; }
        .stat__value { display: block; font-size: 1.5rem; font-weight: 700; color: #7c3aed; }
        .stat__label { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
        footer { margin-top: 3rem; border-top: 1px solid #2a2a40; padding-top: 1.5rem; text-align: center; font-size: 0.8125rem; color: #6b7280; }
        @media (max-width: 600px) { .stats { gap: 1rem; } .stat__value { font-size: 1.25rem; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:0.5rem">
                        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                    </svg>
                    Layoffs Tracker
                </h1>
                <p class="subtitle">Live demo — data updates every 12 hours</p>
            </div>
        </header>

        <div id="stats" class="stats">
            <div class="stat"><span class="stat__value" id="stat-companies">—</span><span class="stat__label">Companies</span></div>
            <div class="stat"><span class="stat__value" id="stat-laidoff">—</span><span class="stat__label">Total Laid Off</span></div>
            <div class="stat"><span class="stat__value" id="stat-recent">—</span><span class="stat__label">Most Recent</span></div>
        </div>

        <table>
            <thead>
                <tr><th>Company</th><th>Jobs Lost</th><th>% Workforce</th><th>Industry</th><th>Date</th></tr>
            </thead>
            <tbody id="layoffs-data">
                <tr><td colspan="5" class="loading">Loading latest layoff data...</td></tr>
            </tbody>
        </table>

        <footer>
            Powered by <a href="https://layoffs.mydomain.com" style="color:#7c3aed;text-decoration:none">layoffs.mydomain.com</a>
        </footer>
    </div>

    <script>
        const API = 'https://layoffs.mydomain.com/api';

        async function loadData() {
            try {
                const [statsRes, layoffsRes] = await Promise.all([
                    fetch(API + '/stats/').then(r => r.json()),
                    fetch(API + '/layoffs/?ordering=-date_reported&page=1').then(r => r.json()),
                ]);

                document.getElementById('stat-companies').textContent = statsRes.total_companies.toLocaleString();
                document.getElementById('stat-laidoff').textContent = statsRes.total_laid_off.toLocaleString();
                document.getElementById('stat-recent').textContent = statsRes.most_recent_date || '—';

                const tbody = document.getElementById('layoffs-data');
                const events = layoffsRes.results || layoffsRes;
                if (events.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty">No layoff data available yet.</td></tr>';
                    return;
                }

                tbody.innerHTML = events.map(e => `
                    <tr>
                        <td>${e.company}${e.is_ai_related ? '<span class="badge">AI</span>' : ''}</td>
                        <td>${e.headcount != null ? e.headcount.toLocaleString() : '—'}</td>
                        <td>${e.percentage != null ? e.percentage + '%' : '—'}</td>
                        <td>${e.industry || '—'}</td>
                        <td>${e.date_reported}</td>
                    </tr>
                `).join('');
            } catch (err) {
                document.getElementById('layoffs-data').innerHTML = '<tr><td colspan="5" class="error">Failed to load data. Is the backend running?</td></tr>';
            }
        }

        loadData();
    </script>
</body>
</html>
